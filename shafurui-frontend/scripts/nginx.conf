server {
    server_name sfr.6688988.xyz;
    root   /var/www/html/sfr;
    index  index.html index.htm;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sfr.6688988.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sfr.6688988.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # HTML 文件禁用缓存
    location ~ ^/(.+\.html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 项目静态资源缓存策略
    location ~ ^/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
      proxy_pass http://127.0.0.1:6305/api/;

      include /etc/nginx/proxy_params;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

}
server {
    if ($host = sfr.6688988.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


  listen 80;
  server_name sfr.6688988.xyz;
    return 404; # managed by Certbot


}
