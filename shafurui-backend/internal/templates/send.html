<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>明叶同行 - 邮箱验证码模板 A1</title>
  </head>
  <body style="margin:0;padding:0;background-color:#eef3f8;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#eef3f8;margin:0;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:680px;width:100%;margin:0 auto;">
            <tr>
              <td style="padding:0 16px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:linear-gradient(135deg,#1f69ff 0%,#4cc7d9 100%);border-radius:28px 28px 0 0;">
                  <tr>
                    <td style="padding:24px 28px;color:#ffffff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
                      <div style="font-size:13px;line-height:20px;opacity:0.9;letter-spacing:1px;">MINGYE CARPOOL</div>
                      <div style="font-size:28px;line-height:36px;font-weight:700;margin-top:6px;">明叶同行</div>
                      <div style="font-size:15px;line-height:24px;opacity:0.92;margin-top:10px;">安全登录与注册验证邮件</div>
                    </td>
                  </tr>
                </table>
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#ffffff;border-radius:0 0 28px 28px;box-shadow:0 18px 45px rgba(42,84,140,0.12);">
                  <tr>
                    <td style="padding:34px 28px 18px 28px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#1f2a37;">
                      <div style="font-size:22px;line-height:32px;font-weight:700;">邮箱验证码</div>
                      <div style="font-size:15px;line-height:28px;color:#526071;margin-top:14px;">
                        您正在使用邮箱进行身份验证。请在页面中输入下方 6 位验证码，完成注册或登录操作。
                      </div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:0 28px;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:linear-gradient(180deg,#f4faff 0%,#edf7ff 100%);border:1px solid #cfe7ff;border-radius:22px;">
                        <tr>
                          <td align="center" style="padding:18px 20px 8px 20px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#5a6b7f;font-size:13px;line-height:20px;letter-spacing:2px;">
                            本次验证码
                          </td>
                        </tr>
                        <tr>
                          <td align="center" style="padding:0 20px 18px 20px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#1170ff;font-size:36px;line-height:44px;font-weight:700;letter-spacing:8px;">
                            {{CODE}}
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:18px 28px 8px 28px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#526071;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                        <tr>
                          <td style="font-size:14px;line-height:24px;padding:0 0 8px 0;">
                            <span style="display:inline-block;background-color:#eaf4ff;color:#0d6eff;border-radius:999px;padding:5px 10px;font-weight:600;">5 分钟内有效</span>
                          </td>
                        </tr>
                        <tr>
                          <td style="font-size:14px;line-height:26px;">
                            如非您本人操作，请直接忽略此邮件。请勿将验证码透露给他人，以保障账号安全。
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:18px 28px 30px 28px;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-top:1px solid #e7eef5;">
                        <tr>
                          <td style="padding-top:18px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#8290a3;font-size:12px;line-height:22px;">
                            此邮件由系统自动发送，请勿直接回复。<br />
                            明叶同行致力于为顺风出行场景提供更清晰、可靠的连接体验。
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
