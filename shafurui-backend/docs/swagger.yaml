basePath: /api
definitions:
  controller.MyCode:
    enum:
    - 1000
    - 1001
    - 1002
    - 1003
    - 1004
    - 1005
    - 1006
    - 1007
    - 1008
    - 1009
    - 1010
    format: int64
    type: integer
    x-enum-comments:
      CodeInvalidParam: 请求参数错误
      CodeInvalidPassword: 用户名或密码错误
      CodeInvalidToken: 无效的token
      CodeNeedLogin: 需要登录
      CodePermissionDenied: 权限不足
      CodeResourceExists: 资源已存在
      CodeResourceNotExist: 资源不存在
      CodeServerBusy: 服务繁忙
      CodeSuccess: 成功
      CodeUserExist: 用户已存在
      CodeUserNotExist: 用户不存在
    x-enum-descriptions:
    - 成功
    - 请求参数错误
    - 用户已存在
    - 用户不存在
    - 用户名或密码错误
    - 服务繁忙
    - 需要登录
    - 无效的token
    - 资源已存在
    - 资源不存在
    - 权限不足
    x-enum-varnames:
    - CodeSuccess
    - CodeInvalidParam
    - CodeUserExist
    - CodeUserNotExist
    - CodeInvalidPassword
    - CodeServerBusy
    - CodeNeedLogin
    - CodeInvalidToken
    - CodeResourceExists
    - CodeResourceNotExist
    - CodePermissionDenied
  controller.SwaggerAdminBatchMutationResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.AdminBatchMutationResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerAdminLoginResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.AdminLoginResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerAdminMutationResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.AdminMutationResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerAdminProfileResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.AdminProfileResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerDiscListResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.DiscListResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerErrorResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1001
      data: {}
      message:
        example: 请求参数错误
        type: string
    type: object
  controller.SwaggerFileProxyResponse:
    properties:
      code:
        type: integer
      data:
        additionalProperties: true
        type: object
      message:
        type: string
    type: object
  controller.SwaggerHelloInfoResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.GetHelloInfoResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerPostDetailResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.PostDetailResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerPostListResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.PostListResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerPostMutationResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        $ref: '#/definitions/model.PostMutationResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerVideoListResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/controller.MyCode'
        example: 1000
      data:
        items:
          $ref: '#/definitions/model.VideoConfig'
        type: array
      message:
        example: success
        type: string
    type: object
  model.AdminBatchMutationResponse:
    properties:
      ids:
        items:
          type: integer
        type: array
