        type: string
    required:
    - name
    type: object
  model.GetHelloInfoResponse:
    properties:
      name:
        type: string
    type: object
  model.Post:
    properties:
      content:
        type: string
      id:
        type: string
      title:
        type: string
    required:
    - content
    - title
